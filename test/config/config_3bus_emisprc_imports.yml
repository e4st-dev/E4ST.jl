base_out_path:    "../out/3bus_emisprc"
mods:
  example_emisprc_empty:  # this will lead to an empty branch table in the emission price mod because there aren't any bus that connect from the filtered buses to to other buses, intentionally including this to test lines of code
    type: "EmissionPrice"
    emis_col: "emis_co2"
    prices: 
      y2035: 10
      y2040: 20
    years_after_ref_min: 0
    years_after_ref_max: 10
    ref_year_col: "year_on"
    gen_filters:
      bus_nation: ["narnia", "archenland"]
    bus_filters:
      nation: ["narnia","archenland"]
    price_imports: true
  example_emisprc_arch:
    type: "EmissionPrice"
    emis_col: "emis_co2"
    prices: 
      y2035: 10
      y2040: 20
    years_after_ref_min: 0
    years_after_ref_max: 10
    ref_year_col: "year_on"
    gen_filters:
      bus_nation: ["archenland"]
    bus_filters:
      nation: ["archenland"]
    price_imports: true
    import_ef_file: "../data/3bus/import_ef_yearly.csv"
  example_emisprc_narnia:
    type: "EmissionPrice"
    emis_col: "emis_co2"
    prices: 
      y2035: 10
      y2040: 20
    years_after_ref_min: 0
    years_after_ref_max: 10
    ref_year_col: "year_on"
    gen_filters:
      bus_nation: ["narnia"]
    bus_filters:
      nation: ["narnia"]
    price_imports: true
    import_ef_file: "../data/3bus/import_ef.csv"
  summer_co2_price:
    type: "EmissionPrice"
    emis_col: "emis_co2"
    prices: 
      y2035: 1.0
      y2040: 1.2
    hour_filters:
      season: summer
    import_ef: 0.4
  

